    #em-toggle{position:fixed;top:12px;right:14px;z-index:9999;width:32px;height:32px;background:var(--white);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;padding:0}
    #em-toggle:hover{border-color:var(--sage)}
    #em-toggle:hover svg{stroke:var(--sage)}
    #em-toggle.on{background:var(--sage);border-color:var(--sage)}
    #em-toggle.on svg{stroke:white}
    #em-toggle svg{stroke:var(--ink40);transition:stroke .18s}
    body.em [data-em]:hover{outline:2px dashed rgba(26,122,74,.6)!important;outline-offset:3px!important;cursor:pointer!important;position:relative!important}
    body.em [data-em].noted{outline:2px solid var(--sage)!important;outline-offset:3px!important}
    body.em [data-em].noted::after{content:'✎';position:absolute;top:-9px;right:-9px;width:17px;height:17px;border-radius:50%;background:var(--sage);color:#fff;font-size:9px;line-height:17px;text-align:center;z-index:9998;pointer-events:none}
    #em-popup{display:none;position:fixed;z-index:10000;width:290px;max-width:290px;box-sizing:border-box;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:0 8px 40px rgba(13,17,23,.18);font-family:'DM Sans',sans-serif}
    #em-popup.open{display:block}
    .em-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--sage);margin-bottom:8px}
    #em-ta{width:100%;max-width:100%;box-sizing:border-box;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;color:var(--ink);resize:none;outline:none;background:#f8f8f6;min-height:70px}
    #em-ta:focus{border-color:var(--sage)}
    .em-row{display:flex;gap:7px;margin-top:9px}
    .em-save{flex:1;padding:7px;background:var(--sage);color:#fff;border:none;border-radius:999px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
    .em-sec{padding:7px 12px;background:transparent;color:var(--ink40);border:1px solid var(--border);border-radius:999px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
    #em-fab{display:none;position:fixed;bottom:24px;left:24px;z-index:9999;width:46px;height:46px;border-radius:50%;background:var(--sage);border:none;cursor:pointer;box-shadow:0 4px 18px rgba(26,122,74,.4);align-items:center;justify-content:center;transition:transform .15s}
    #em-fab:hover{transform:scale(1.1)}
    #em-fab.noted{background:var(--ink)}
    body.em #em-fab{display:flex}
    #em-sp{display:none;position:fixed;bottom:82px;left:24px;z-index:9999;width:310px;max-width:310px;box-sizing:border-box;background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:0 8px 40px rgba(13,17,23,.16);font-family:'DM Sans',sans-serif}
    #em-sp.open{display:block}
    .em-sp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .em-sp-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--sage)}
    .em-tabs{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px}
    .em-tab{flex:1;padding:6px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;background:#f5f5f3;color:var(--ink40);border:none;cursor:pointer;transition:background .12s,color .12s}
    .em-tab.on{background:var(--sage);color:#fff}
    #em-sp-ta{width:100%;max-width:100%;box-sizing:border-box;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;color:var(--ink);resize:none;outline:none;background:#f8f8f6;min-height:76px}
    #em-sp-ta:focus{border-color:var(--sage)}
    #em-bar{display:none;position:fixed;bottom:24px;right:24px;z-index:9999;flex-direction:column;align-items:flex-end;gap:8px;width:auto;max-width:260px}
    body.em #em-bar{display:flex}
    .em-bar-btn{padding:11px 20px;border:none;border-radius:999px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:transform .15s,box-shadow .15s}
    .em-bar-btn:hover{transform:translateY(-2px)}
    .em-submit{background:var(--sage);color:#fff;box-shadow:0 4px 18px rgba(26,122,74,.4)}
    .em-publish{background:var(--ink);color:#fff;box-shadow:0 4px 18px rgba(13,17,23,.25)}
    #em-modal{display:none;position:fixed;inset:0;z-index:10001;background:rgba(13,17,23,.55);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px}
    #em-modal.open{display:flex}
    #em-modal-card{background:var(--white);border-radius:16px;padding:28px;max-width:540px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 16px 60px rgba(13,17,23,.25);font-family:'DM Sans',sans-serif}
    .em-modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .em-modal-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--ink)}
    .em-modal-body{font-size:15px;color:var(--ink70);line-height:1.6;margin-bottom:22px}
    .em-modal-row{display:flex;gap:10px}
    .em-modal-ok{flex:1;padding:12px;background:var(--ink);color:#fff;border:none;border-radius:999px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
    .em-modal-cancel{padding:12px 18px;background:transparent;color:var(--ink40);border:1px solid var(--border);border-radius:999px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
    .em-x{background:none;border:none;cursor:pointer;color:var(--ink40);font-size:22px;line-height:1;padding:0 2px}
    #em-submit-modal{display:none;position:fixed;inset:0;z-index:10001;background:rgba(13,17,23,.55);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px}
    #em-submit-modal.open{display:flex}
    #em-submit-card{background:var(--white);border-radius:16px;padding:28px;width:540px;max-width:90vw;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 16px 60px rgba(13,17,23,.25);font-family:'DM Sans',sans-serif}
    .em-submit-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-shrink:0}
    .em-submit-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--ink)}
    .em-submit-sub{font-size:13px;color:var(--ink40);margin-bottom:12px;flex-shrink:0}
    .em-submit-preview{flex:1;overflow-y:auto;background:var(--sand);border:1.5px solid var(--sage);border-radius:10px;padding:14px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.7;color:var(--ink);white-space:pre-wrap;min-height:100px;max-height:320px;margin-bottom:18px;user-select:all;cursor:text}
    .em-submit-row{display:flex;gap:10px;flex-shrink:0}
    .em-submit-btn{flex:1;padding:12px;background:var(--sage);color:#fff;border:none;border-radius:999px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s;display:flex;align-items:center;justify-content:center}
    .em-submit-btn:hover{opacity:.88}
    #em-banner{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9998;background:var(--sage);color:#fff;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:7px 18px;border-radius:999px;pointer-events:none;box-shadow:0 4px 18px rgba(26,122,74,.4)}
    body.em #em-banner{display:block}

  global_js: |
    var emOn=false,emStore={},emActiveKey=null,emActivePopup=false,emSpTabState='page',EM_DOC_KEY='__doc__',cur=0;

    function goTo(n){var s=document.querySelectorAll('.slide'),d=document.querySelectorAll('.dot');if(!s[cur]||!s[n])return;s[cur].classList.remove('active');d[cur].classList.remove('active');cur=n;s[cur].classList.add('active');d[cur].classList.add('active');document.getElementById('counter').textContent=String(cur+1).padStart(2,'0')+' / 09';document.getElementById('prog').style.width=((cur+1)/9*100)+'%';emSpUpdate();}
    function next(){if(cur<8)goTo(cur+1);}
    function prev(){if(cur>0)goTo(cur-1);}
    function emToggle(){emOn=!emOn;document.body.classList.toggle('em',emOn);var b=document.getElementById('em-toggle');b.classList.toggle('on',emOn);b.title=emOn?'Edit mode ON':'Toggle edit mode';if(!emOn)emClose();emSpUpdate();}
    function emOpen(node){emClose();emActiveKey=node.getAttribute('data-em');emActivePopup=true;var lbl=node.getAttribute('data-em-lbl')||emActiveKey,rect=node.getBoundingClientRect();document.getElementById('em-lbl').textContent='✎ '+lbl;document.getElementById('em-ta').value=emStore[emActiveKey]||'';var p=document.getElementById('em-popup'),top=rect.bottom+8,left=rect.left;if(top+180>window.innerHeight)top=rect.top-185;if(left+295>window.innerWidth)left=window.innerWidth-300;if(left<6)left=6;p.style.top=top+'px';p.style.left=left+'px';p.classList.add('open');setTimeout(function(){var t=document.getElementById('em-ta');if(t)t.focus();},40);}
    function emSave(){var val=document.getElementById('em-ta').value.trim(),node=document.querySelector('[data-em="'+emActiveKey+'"]');if(val){emStore[emActiveKey]=val;if(node)node.classList.add('noted');}else{delete emStore[emActiveKey];if(node)node.classList.remove('noted');}emClose();}
    function emClear(){var node=document.querySelector('[data-em="'+emActiveKey+'"]');delete emStore[emActiveKey];if(node)node.classList.remove('noted');emClose();}
    function emClose(){var p=document.getElementById('em-popup');if(p)p.classList.remove('open');emActiveKey=null;emActivePopup=false;}
    function emSpToggle(){var sp=document.getElementById('em-sp');sp.classList.toggle('open');if(sp.classList.contains('open')){emSpUpdate();setTimeout(function(){var t=document.getElementById('em-sp-ta');if(t)t.focus();},40);}}
    function emSpTab(tab){emSpTabState=tab;document.getElementById('em-tab-page').classList.toggle('on',tab==='page');document.getElementById('em-tab-doc').classList.toggle('on',tab==='doc');emSpUpdate();}
    function emSpUpdate(){var key=emSpTabState==='page'?'slide-'+cur:EM_DOC_KEY,ta=document.getElementById('em-sp-ta'),title=document.getElementById('em-sp-title'),fab=document.getElementById('em-fab');if(!ta)return;var names=['Cover','Problem','Demo','Moat','Market','Roadmap','Founder','Ask','Closing'];title.textContent=emSpTabState==='page'?'Slide '+(cur+1)+' — '+(names[cur]||''): 'Whole deck feedback';ta.placeholder=emSpTabState==='page'?'Feedback about this slide…':'Overall deck feedback…';ta.value=emStore[key]||'';fab.classList.toggle('noted',!!(emStore['slide-'+cur]||emStore[EM_DOC_KEY]));}
    function emSpSave(){var key=emSpTabState==='page'?'slide-'+cur:EM_DOC_KEY,val=document.getElementById('em-sp-ta').value.trim();if(val)emStore[key]=val;else delete emStore[key];emSpUpdate();var btn=document.querySelector('#em-sp .em-save');btn.textContent='Saved ✓';setTimeout(function(){btn.textContent='Save note';},1200);}
    function emSpClear(){var key=emSpTabState==='page'?'slide-'+cur:EM_DOC_KEY;delete emStore[key];document.getElementById('em-sp-ta').value='';emSpUpdate();}
    function emBuildPrompt(){var entries=Object.entries(emStore),names=['Cover','Problem','Demo','Moat','Market','Roadmap','Founder','Ask','Closing'],notes;if(entries.length>0){notes=entries.map(function(e){var k=e[0],v=e[1];if(k===EM_DOC_KEY)return'• [Whole deck]: '+v;if(k.startsWith('slide-')){var n=parseInt(k.replace('slide-',''));return'• [Slide '+(n+1)+' — '+(names[n]||'')+']: '+v;}var node=document.querySelector('[data-em="'+k+'"]'),label=node?node.getAttribute('data-em-lbl'):k;return'• ['+label+']: '+v;}).join('\n');}else{notes='(No annotations — please apply general improvements.)';}return 'I have reviewed the Constellation Database pitch deck and have the following feedback. Please update the deck and return an updated HTML file. IMPORTANT: preserve all edit mode infrastructure exactly as-is (the pencil toggle button, FAB, slide popover, action bar, modals, all #em- CSS, data-em attributes, and the full edit mode JavaScript). Only change what is listed in the feedback below:\n\n'+notes+'\n\nApply all changes and return an updated HTML file.';}
    function emSubmit(){document.getElementById('em-submit-preview').textContent=emBuildPrompt();document.getElementById('em-submit-modal').classList.add('open');}
    function emSubmitClose(){document.getElementById('em-submit-modal').classList.remove('open');}
