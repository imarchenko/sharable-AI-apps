# ============================================================
# claude-edit-mode.app
# Schema: v2.0.0  |  App: v1.2.0
# Open Format — shareable edit mode layer for Claude.ai HTML docs
# ============================================================

meta:
  schema_version: "2.0.0"
  name: "Claude Edit Mode"
  id: "claude-edit-mode"
  version: "1.2.0"
  description: >
    A drop-in, zero-dependency edit mode layer for any Claude.ai HTML document.
    Adds hover-to-annotate, element-level feedback popups, slide/page notes,
    and copy-to-clipboard prompt builders so users can send structured feedback
    back to Claude for document regeneration or clean export.
  author: "Igor Marchenko"
  contact: "imarchen@gmail.com"
  created: "2026-03-17"
  updated: "2026-03-17"
  license: "MIT"
  tags:
    - edit-mode
    - feedback
    - claude-ai
    - html-component
    - open-format
    - pitch-deck
    - community


# ------------------------------------------------------------
# BLOCK 2: intent
# ------------------------------------------------------------
intent:
  goal: >
    Give any Claude.ai HTML document a persistent edit mode so reviewers can
    annotate individual elements, leave slide-level or whole-document notes,
    and copy structured feedback prompts to their clipboard — either to ask
    Claude to apply changes (Save edits) or to strip all edit mode code
    from the document (Remove edit mode).

  audience: >
    Claude.ai users who create HTML documents (pitch decks, reports, landing
    pages, dashboards) and want to share them with collaborators or the
    community for structured feedback and AI-assisted revision.

  context: |
    Edit mode is toggled by a small pencil icon button (32x32px) fixed in the
    top-right corner. When ON, every annotatable element gets a dashed green
    hover outline. Clicking any element opens a popup textarea. A floating
    chat-bubble FAB (bottom-left) opens a popover for slide-level or whole-deck
    notes. A bottom-right action bar has two buttons:

    1. "Save edits for Claude" — opens a preview modal showing the structured
       feedback prompt. Copy button puts it on clipboard. Paste into Claude
       to regenerate with changes applied, with edit mode preserved.

    2. "Remove edit mode" — opens a preview modal showing a concrete 12-item
       removal checklist prompt. Copy and paste into Claude to get a clean,
       presentation-ready version with all edit infrastructure stripped.

    Both modals use the same design: green-bordered monospace preview box,
    clipboard icon + "Copy to clipboard" button, execCommand fallback for
    sandboxed iframes, X close button.

    New in v1.2.0: Elements without CSS classes (e.g. inline-styled work
    history rows) are now tagged by adding semantic classes (founder-co,
    founder-desc) so they appear in the annotatable element set.

  use_cases:
    - Pitch deck review with structured feedback loop back to Claude
    - Document proofreading with element-level annotations
    - Community sharing of editable HTML documents on Claude.ai
    - Exporting a clean presentation-ready version via Remove edit mode
    - Iterative AI-assisted design with human reviewer in the loop

  constraints:
    must: |
      - Work in Claude.ai file preview (sandboxed iframe, no clipboard API)
      - Work in standalone browser as downloaded HTML
      - Zero external dependencies (pure vanilla JS + CSS)
      - All state in memory (no localStorage)
      - Feedback prompt must include IMPORTANT preservation instruction
      - Remove edit mode prompt must list all 12 removal items concretely
      - Copy fallback must use execCommand for sandboxed iframes
      - Inline-styled elements must have semantic classes added to be taggable
    must_not: |
      - Require any build step or bundler
      - Use localStorage or sessionStorage
      - Use let/const for top-scope state vars (TDZ bug with onclick attrs)
      - Call sendPrompt() unconditionally

  out_of_scope:
    - Multi-user real-time collaboration
    - Persistent annotation storage across sessions
    - Integration with external review tools


# ------------------------------------------------------------
# BLOCK 3: build
# ------------------------------------------------------------
build:
  platform: "Claude.ai / standalone browser"
  output_format: "HTML (embedded CSS + vanilla JS, no dependencies)"

  framework:
    name: "Vanilla JS"
    version: "ES5-compatible"

  dependencies: []

  storage: >
    In-memory only. feedbackStore object. Keys: em[n] for elements,
    slide-[n] for per-slide notes, __doc__ for whole-deck note.

  ai_platform: "Claude Sonnet 4.6 (claude-sonnet-4-6)"

  ai_prompt: |
    Add a drop-in edit mode layer to this HTML document.

    Implement these 8 UI elements, all fixed-position, z-index 9999+:
    1. #em-toggle — 32x32px pencil icon, top-right. Toggles body.em class.
    2. #em-popup — 290px annotation popup. Opens on [data-em] element click.
    3. #em-fab — 46px chat-bubble FAB, bottom-left. Opens #em-sp popover.
    4. #em-sp — 310px slide/deck popover with "This slide" / "Whole deck" tabs.
    5. #em-bar — bottom-right action bar, two pill buttons (submit + publish).
    6. #em-submit-modal — feedback preview modal with green preview box + copy btn.
    7. #em-modal — remove edit mode modal with green preview box + copy btn.
    8. #em-banner — bottom-center banner strip, visible when edit mode ON.

    Both modals (#em-submit-modal and #em-modal) must use identical layout:
    - em-submit-title + em-x close button header
    - em-submit-sub subtitle
    - em-submit-preview green-bordered monospace preview box (user-select:all)
    - em-submit-btn copy button with clipboard SVG icon
    - execCommand fallback + select-all fallback for sandboxed iframes

    The feedback prompt (emBuildPrompt) must begin:
    "IMPORTANT: preserve all edit mode infrastructure exactly as-is..."

    The removal prompt (PUBLISH_PROMPT constant) must itemize all 12 elements:
    #em-toggle, #em-fab, #em-sp, #em-bar, #em-popup, #em-submit-modal,
    #em-modal, #em-banner, all #em-/#.em-/body.em CSS, all em* JS functions,
    all data-em/data-em-lbl attributes, all .noted classes.

    For elements that lack CSS classes (e.g. inline-styled divs), add semantic
    class names (e.g. founder-co, founder-desc) and include them in the
    tagElements selector list so they become annotatable.

    All state vars must use var. All DOM ops inside DOMContentLoaded.

  environment_notes: |
    navigator.clipboard blocked in sandboxed iframes — execCommand fallback required.
    sendPrompt() not available in file preview — clipboard is the primary path.
    Cloudflare can inject script tags corrupting uploads — always validate on load.
    var required (not let/const) for onclick-accessible globals.


