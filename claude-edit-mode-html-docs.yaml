# ------------------------------------------------------------
# BLOCK 5: design
# ------------------------------------------------------------
design:
  aesthetic: >
    Minimal, functional overlay. Sage green (#1A7A4A) as single accent.
    All edit UI fixed-position, invisible when OFF, compact when ON.
    Both modals share identical layout — preview box + copy button.
  theme: "light"

  components:
    - name: "em-toggle"
      description: "32x32px pencil icon, top-right. Toggles edit mode."
      states:
        - "off: white bg, ink border, ink40 icon"
        - "on: sage bg, white icon"
        - "hover: sage border, sage icon"

    - name: "em-submit-modal + em-modal"
      description: "Identical layout: preview box + copy button + X close."
      behavior: >
        Both use em-submit-preview (green border), em-submit-btn (copy),
        em-x (close). Copy tries navigator.clipboard, falls back to
        execCommand, then select-all highlight on failure.

  interactions:
    - trigger: "Save edits for Claude button"
      action: "emSubmit() — show em-submit-modal with emBuildPrompt() output"
      feedback: "Green-bordered preview, copy button"
    - trigger: "Remove edit mode button"
      action: "emPublish() — show em-modal with PUBLISH_PROMPT constant"
      feedback: "Green-bordered preview, copy button"
    - trigger: "Copy to clipboard (either modal)"
      action: "navigator.clipboard → execCommand → select-all fallback"
      feedback: "Button: Copied! ✓ for 2s, then restores icon"

  responsive: false
  accessibility: "Keyboard nav preserved. Arrow keys work when no popup open."


# ------------------------------------------------------------
# BLOCK 6: verify
# ------------------------------------------------------------
verify:
  success_criteria: |
    1. Pencil icon appears top-right, not overlapping navigation.
    2. Edit mode toggles ON/OFF (green fill indicator).
    3. Hovering annotatable elements shows dashed green outline.
    4. Clicking element opens correctly positioned popup.
    5. Saving note adds badge and stores in emStore.
    6. FAB appears/disappears with edit mode state.
    7. FAB popover has two tabs with correct keying.
    8. Action bar appears bottom-right when edit mode ON.
    9. Save edits modal shows structured feedback prompt with IMPORTANT instruction.
    10. Remove edit mode modal shows 12-item numbered removal prompt.
    11. Both copy buttons work in Claude.ai file preview (execCommand fallback).
    12. Arrow key navigation unaffected when no popup open.
    13. No layout breakage — all edit UI is fixed-position.
    14. Inline-styled elements with added semantic classes are annotatable.

  must_include:
    - "All 8 #em-* elements with correct IDs"
    - "var declarations (not let/const) for all top-scope state"
    - "DOMContentLoaded for all DOM operations"
    - "execCommand clipboard fallback"
    - "IMPORTANT preservation instruction in feedback prompt"
    - "PUBLISH_PROMPT constant with 12 numbered removal items"
    - "Identical modal layout for both em-submit-modal and em-modal"
    - "founder-co and founder-desc classes on work history items"

  must_not_include:
    - "External dependencies"
    - "localStorage or sessionStorage"
    - "let/const for top-scope state vars"
    - "DOM queries outside DOMContentLoaded"

  fidelity_target:
    structure: 98
    visual: 96
    behaviour: 98
    output: 97

  review:
    human_required: true
    method: "Manual test in Claude.ai file preview + standalone browser"
    reviewer: "Igor Marchenko"


